openapi: 3.0.3
info:
  title: Hermes OS API
  version: 0.1.0
  description: Minimal runtime surface for Hermes OS.

servers:
  - url: /v1
    description: Default Hermes OS API root.
  - url: http://localhost:8000/v1
    description: Local development fallback.
  - url: https://api.hermes.example/v1
    description: Production preview endpoint.

paths:
  /v1/status:
    get:
      operationId: getStatus
      responses:
        '200':
          description: Current Hermes OS runtime status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              examples:
                ok:
                  value:
                    status: ok
                    active_runs: 1
                    queued_items: 2
                    failed_items: 0
                    updated_at: 1719000000.123
  /v1/actions/history:
    get:
      operationId: listActions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Recent action records.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActionRecord'
              examples:
                history:
                  value:
                    - action_id: act-1
                      run_id: run-1
                      action_type: submitted
                      status: queued
                      started_at: '2024-06-23T12:00:00Z'
                      finished_at: null
                      input_snapshot: {}
                      output_snapshot: {}
                      error: null
  /v1/artifacts:
    get:
      operationId: listArtifacts
      parameters:
        - name: run_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Artifacts filtered by run.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArtifactRef'
              examples:
                artifacts:
                  value:
                    - artifact_id: artifact-1
                      run_id: run-1
                      filename: report.json
                      content_type: application/json
                      size_bytes: 128
                      created_at: '2024-06-23T12:01:00Z'
                      absolute_path: /tmp/artifacts/report.json
                      sha256: abc123
    post:
      operationId: registerArtifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactRegisterRequest'
            examples:
              default:
                value:
                  run_id: run-1
                  path: /tmp/artifacts/report.json
                  content_type: application/json
      responses:
        '201':
          description: Artifact registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactRef'

components:
  schemas:
    StatusResponse:
      type: object
      properties:
        status:
          type: string
        active_runs:
          type: integer
        queued_items:
          type: integer
        failed_items:
          type: integer
        updated_at:
          type: number
          format: double
    ActionRecord:
      type: object
      properties:
        action_id:
          type: string
        run_id:
          type: string
        action_type:
          type: string
        status:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        input_snapshot:
          type: object
        output_snapshot:
          type: object
        error:
          type: string
    ArtifactRef:
      type: object
      properties:
        artifact_id:
          type: string
        run_id:
          type: string
        filename:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        absolute_path:
          type: string
        sha256:
          type: string
    ArtifactRegisterRequest:
      type: object
      required:
        - run_id
        - path
      properties:
        run_id:
          type: string
        path:
          type: string
        content_type:
          type: string
          default: application/octet-stream
