openapi: 3.0.3
info:
  title: Hermes OS API
  version: 0.1.0
  description: Minimal runtime surface for Hermes OS.

servers:
  - url: /v1
    description: Default Hermes OS API root.
  - url: http://localhost:8000/v1
    description: Local development fallback.
  - url: https://api.hermes.example/v1
    description: Production preview endpoint.

security:
  - BearerAuth: []

paths:
  /v1/status:
    get:
      operationId: getStatus
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current Hermes OS runtime status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              examples:
                ok:
                  value:
                    status: ok
                    active_runs: 1
                    queued_items: 2
                    failed_items: 0
                    updated_at: 1719000000.123
  /v1/actions/history:
    get:
      operationId: listActions
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated recent action records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionHistoryResponse'
              examples:
                page1:
                  value:
                    page: 1
                    page_size: 10
                    total: 25
                    items:
                      - action_id: act-1
                        run_id: run-1
                        action_type: submitted
                        status: queued
                        started_at: '2024-06-23T12:00:00Z'
                        finished_at: null
                        input_snapshot: {}
                        output_snapshot: {}
                        error: null
  /v1/artifacts:
    get:
      operationId: listArtifacts
      security:
        - BearerAuth: []
      parameters:
        - name: run_id
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated artifacts filtered by run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
              examples:
                page1:
                  value:
                    page: 1
                    page_size: 10
                    total: 3
                    items:
                      - artifact_id: artifact-1
                        run_id: run-1
                        filename: report.json
                        content_type: application/json
                        size_bytes: 128
                        created_at: '2024-06-23T12:01:00Z'
                        absolute_path: /tmp/artifacts/report.json
                        sha256: abc123
    post:
      operationId: registerArtifact
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactRegisterRequest'
            examples:
              default:
                value:
                  run_id: run-1
                  path: /tmp/artifacts/report.json
                  content_type: application/json
      responses:
        '201':
          description: Artifact registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactRef'
  /v1/auth/refresh:
    post:
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              default:
                value:
                  refresh_token: abc123
      responses:
        '200':
          description: New access token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
              examples:
                ok:
                  value:
                    access_token: xyz789
                    token_type: bearer
                    expires_in: 3600
        '401':
          description: Refresh token invalid.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Hermes OS API Key
    RefreshToken:
      type: apiKey
      in: header
      name: X-Refresh-Token
  schemas:
    StatusResponse:
      type: object
      properties:
        status:
          type: string
        active_runs:
          type: integer
        queued_items:
          type: integer
        failed_items:
          type: integer
        updated_at:
          type: number
          format: double
    ActionHistoryResponse:
      type: object
      required:
        - page
        - page_size
        - total
        - items
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActionRecord'
    ArtifactListResponse:
      type: object
      required:
        - page
        - page_size
        - total
        - items
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactRef'
    ActionRecord:
      type: object
      properties:
        action_id:
          type: string
        run_id:
          type: string
        action_type:
          type: string
        status:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        input_snapshot:
          type: object
        output_snapshot:
          type: object
        error:
          type: string
    ArtifactRef:
      type: object
      properties:
        artifact_id:
          type: string
        run_id:
          type: string
        filename:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        absolute_path:
          type: string
        sha256:
          type: string
    ArtifactRegisterRequest:
      type: object
      required:
        - run_id
        - path
      properties:
        run_id:
          type: string
        path:
          type: string
        content_type:
          type: string
          default: application/octet-stream
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    RefreshResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
